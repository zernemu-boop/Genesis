{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact</title>

    <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f4f7fb;
            font-family:Inter,"Segoe UI",sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .edit-card{
            width:100%;
            max-width:750px;
            background:white;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.08);
            overflow:hidden;
        }

        .card-header{
            background:linear-gradient(135deg,#0f766e,#14b8a6);
            color:white;
            text-align:center;
            padding:30px;
        }

        .card-header h2{
            margin:0;
            font-weight:700;
        }

        .card-header p{
            margin-top:8px;
            opacity:.9;
        }

        .card-body{
            padding:35px;
        }

        .form-label{
            font-weight:600;
            color:#374151;
            margin-bottom:8px;
        }

        .form-control{
            border-radius:12px;
            padding:12px 15px;
            border:1px solid #d1d5db;
            transition:.3s;
        }

        .form-control:focus{
            border-color:#14b8a6;
            box-shadow:0 0 0 4px rgba(20,184,166,.15);
        }

        textarea.form-control{
            resize:none;
        }

        .btn-update{
            width:100%;
            background:#0f766e;
            color:white;
            border:none;
            padding:14px;
            border-radius:12px;
            font-size:16px;
            font-weight:600;
            transition:.3s;
        }

        .btn-update:hover{
            background:#115e59;
            transform:translateY(-2px);
        }

        @media(max-width:768px){

            .card-body{
                padding:25px;
            }

        }
    </style>

</head>
<body>

<div class="edit-card">

    <div class="card-header">
        <h2>Edit Contact Information</h2>
        <p>Update the contact details below and save your changes.</p>
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="row gy-4">

                <div class="col-md-6">
                    <label for="name-field" class="form-label">
                        Your Name
                    </label>

                    <input
                        type="text"
                        id="name-field"
                        name="name"
                        value="{{ editappointment.name }}"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-6">
                    <label for="email-field" class="form-label">
                        Your Email
                    </label>

                    <input
                        type="email"
                        id="email-field"
                        name="email"
                        value="{{ editappointment.email }}"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-12">
                    <label for="subject-field" class="form-label">
                        Subject
                    </label>

                    <input
                        type="text"
                        id="subject-field"
                        name="subject"
                        value="{{ editappointment.subject }}"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-12">
                    <label for="message-field" class="form-label">
                        Message
                    </label>

                    <textarea
                        id="message-field"
                        name="message"
                        rows="7"
                        class="form-control"
                        required>{{ editappointment.message }}</textarea>
                </div>

                <div class="col-12">

                    <button type="submit" class="btn-update">
                        Update Contact
                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
